<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Архив памяти — flipbook-js (stable)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Literata:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flipbook-js@1.1.1/dist/flipbook.min.css">
  <link rel="stylesheet" href="/static/css/style.css">

  <script defer src="https://cdn.jsdelivr.net/npm/flipbook-js@1.1.1/dist/flipbook.umd.min.js"></script>
  <script defer src="/static/js/script.js"></script>
</head>
<body>
  <div class="shell">
    <div class="toolbar">
      <button id="prev">← Назад</button>
      <button id="next">Вперёд →</button>
      <button id="rebuild">↻ Пересобрать</button>
      <span class="status" id="status">Загрузка…</span>
    </div>

    <div class="toc" id="floating-toc"></div>

    <div class="book-wrap">
      <div class="c-flipbook" id="book"></div>
    </div>
  </div>
</body>
</html>
